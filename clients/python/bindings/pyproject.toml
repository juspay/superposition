[project]
name = "superposition_bindings"
dynamic = ["version"]
description = "Python bindings for Superposition"
requires-python = ">=3.8"
readme = "README.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["superposition_bindings"]
artifacts = ["superposition_bindings/libsuperposition_core.*"]

[tool.hatch.version]
source = "env"
variable = "VERSION"
