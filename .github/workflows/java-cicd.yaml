name: Java CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/java

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Run Gradle assemble
      run: ./gradlew assemble

    ## This requires more setup. Specifically, we need the server to be up w/
    ## some dummy data.
    # - name: Run tests
    #   run: ./gradlew test

    - name: Upload build artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: |
          build/reports/
          build/test-results/
        retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: clients/java

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Publish to Sonatype
      run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
      env:
        GRADLE_OPTS: >-
          -DsonatypeUsername=${{ secrets.SONATYPE_USERNAME }}
          -DsonatypePassword=${{ secrets.SONATYPE_PASSWORD }}
          -DsigningKey=${{ secrets.SIGNING_KEY }}
          -DsigningPassword=${{ secrets.SIGNING_PASSWORD }}
