# Hyperswitch development.toml expressed as SuperTOML.
#
# Source: https://github.com/juspay/hyperswitch/blob/main/config/development.toml
#
# The original file mixes static settings (db, redis, log) with context-keyed
# settings: pm_filters.<connector>.<payment_method> = { country, currency },
# bank_config.<payment_method>.<connector> = { banks }, mandates.<payment_method>
# .<connector>, tokenization.<connector>, [connectors].<connector>.base_url, etc.
#
# Every one of those is really a function of (connector, payment_method,
# country, currency). SuperTOML lets us declare them once as defaults and then
# cascade overrides by context instead of repeating the same payment-method
# entry across dozens of [pm_filters.<connector>] tables.
#
# Dimensions (positions = priority weight; higher wins):
#   connector       (5)  most specific axis - connector-level rules dominate
#   country         (4)  ISO 3166-1 alpha-2
#   payment_method  (3)  card.credit, klarna, ideal, etc. (user-requested)
#   currency        (2)  ISO 4217
#   region          (1)  LOCAL_COHORT:country - groups countries (EU, NA, ...)

#-------------------------------------------------------------------------------
# Default configs
#-------------------------------------------------------------------------------

[default-configs]

# Unified availability flag, queried with `payment_type` to mean any of:
#   - is this payment method offered?         (payment_type = "normal")
#   - is mandate creation supported?          (payment_type = "mandate")
#   - is a zero-dollar mandate supported?     (payment_type = "zero_dollar_mandate")
# Replaces the prior trio: enabled / mandate_supported / zero_mandate_supported.
enabled = { value = false, schema = { type = "boolean" } }

# [connectors] section: sandbox base URL for the connector.
base_url = { value = "https://example.invalid/", schema = { type = "string", format = "uri" } }

# [installments.supported_payment_methods] + [installment_config]
installments_supported = { value = false, schema = { type = "boolean" } }

# [tokenization]
tokenization_enabled = { value = false, schema = { type = "boolean" } }
tokenization_long_lived_token = { value = false, schema = { type = "boolean" } }

# [bank_config.<payment_method>.<connector>] = { banks = "a,b,c" }
# Stored as an array - SuperTOML schemas give us type-safety the CSV string lacks.
supported_banks = { value = [], schema = { type = "array", items = { type = "string" }, uniqueItems = true } }

# Per-connector boolean flag bundle. Source uses CSV "connector_list" strings;
# here each is a flat boolean keyed on `connector` via a single override per
# connector in the source list.
# [network_transaction_id_supported_connectors] connector_list = "adyen,..."
network_transaction_id_supported = { value = false, schema = { type = "boolean" } }
# [card_only_mit_supported_connectors] connector_list = "peachpayments"
card_only_mit_supported = { value = false, schema = { type = "boolean" } }
# [notify_iframe_exit_and_redirect] connector_list = "worldpayxml"
notify_iframe_exit_and_redirect = { value = false, schema = { type = "boolean" } }
# [delayed_session_response] connectors_with_delayed_session_response = "trustpay,payme"
delayed_session_response = { value = false, schema = { type = "boolean" } }
# [webhook_source_verification_call] connectors_with_webhook_source_verification_call = "paypal,truelayer"
webhook_source_verification_required = { value = false, schema = { type = "boolean" } }
# [billing_connectors_payment_sync] billing_connectors_which_require_payment_sync = "stripebilling,recurly"
billing_payment_sync_required = { value = false, schema = { type = "boolean" } }
# [billing_connectors_invoice_sync] billing_connectors_which_requires_invoice_sync_call = "recurly"
billing_invoice_sync_required = { value = false, schema = { type = "boolean" } }
# [connector_customer] payout_connector_list = "nomupay,stripe,wise,trustly"
payout_customer_connector_supported = { value = false, schema = { type = "boolean" } }
# [temp_locker_enable_config] <connector> = { payment_method = "card" | "bank_debit" | ... }
temp_locker_enabled = { value = false, schema = { type = "boolean" } }

#-------------------------------------------------------------------------------
# Dimensions
#-------------------------------------------------------------------------------

[dimensions]

# Subset of [connectors.supported] for readability; extend freely.
connector = { position = 5, schema = { type = "string", enum = ["adyen", "adyenplatform", "airwallex", "archipel", "authorizedotnet", "bankofamerica", "barclaycard", "bluesnap", "braintree", "checkout", "cybersource", "deutschebank", "elavon", "envoy", "fiuu", "gigadat", "gocardless", "hipay", "klarna", "loonio", "moneris", "multisafepay", "nexinets", "nexixpay", "nmi", "nomupay", "novalnet", "nuvei", "paybox", "payload", "payme", "paypal", "paysafe", "peachpayments", "phonepe", "paytm", "razorpay", "recurly", "redsys", "revolv3", "santander", "shift4", "stripe", "stripebilling", "trustly", "truelayer", "trustpay", "volt", "wise", "worldpay", "worldpayvantiv", "worldpayxml", "xendit"] } }

# Request-level capture flag. Source uses `not_available_flows = { capture_method
# = "manual" }` on pm_filters rows to mean "supported, except not for manual
# capture". Placing it at a high position lets a single override flip
# `enabled = false` only when the request asks for manual capture, leaving the
# broader connector/country/payment-method rules to enable the automatic case.
capture_method = { position = 6, schema = { type = "string", enum = ["automatic", "manual"] } }

# What kind of payment is being asked about. Lets the unified `enabled` flag
# answer all three questions the source previously had separate sections for:
#   pm_filters.* + [pm_filters.default]       -> payment_type = "normal"
#   [mandates.supported_payment_methods]      -> payment_type = "mandate"
#   [zero_mandates.supported_payment_methods] -> payment_type = "zero_dollar_mandate"
#   [payout_method_filters.*]                 -> payment_type = "payout"
# Placed at the highest position so a "denial floor" override on payment_type
# alone disables mandate / zero_dollar_mandate / payout by default, and
# connector+payment-method-specific overrides re-enable just the supported pairs.
payment_type = { position = 7, schema = { type = "string", enum = ["normal", "mandate", "zero_dollar_mandate", "payout"] } }

# ISO 3166-1 alpha-2. Pruned to countries referenced in pm_filters.
country = { position = 4, schema = { type = "string", enum = ["AT", "AU", "BE", "BR", "CA", "CH", "CN", "CZ", "DE", "DK", "ES", "FI", "FR", "GB", "GR", "HK", "HU", "ID", "IE", "IN", "IT", "JP", "KR", "MX", "MY", "NL", "NO", "NZ", "PH", "PL", "PT", "RO", "SE", "SG", "SK", "TH", "TW", "US", "VN", "ZA"] } }

# Card variants are namespaced (card.credit) in the source; flattened here
# because SuperTOML dimensions are flat strings.
payment_method = { position = 3, schema = { type = "string", enum = ["credit", "debit", "google_pay", "apple_pay", "samsung_pay", "paypal", "klarna", "affirm", "afterpay_clearpay", "ali_pay", "we_chat_pay", "ach", "bacs", "becs", "sepa", "ideal", "eps", "giropay", "sofort", "bancontact_card", "przelewy24", "blik", "trustly", "open_banking", "open_banking_uk", "open_banking_pis", "online_banking_fpx", "online_banking_thailand", "pix", "boleto", "upi_collect", "upi_intent", "mb_way", "swish", "multibanco", "revolut_pay", "amazon_pay", "cashapp", "atome", "bizum", "go_pay", "kakao_pay", "momo", "gcash", "touch_n_go", "mobile_pay", "pay_bright", "walley", "bank_transfer", "interac"] } }

# ISO 4217. Pruned to currencies referenced in pm_filters.
currency = { position = 2, schema = { type = "string", enum = ["AED", "AUD", "BRL", "CAD", "CHF", "CNY", "CZK", "DKK", "EUR", "GBP", "HKD", "HUF", "IDR", "ILS", "INR", "JPY", "KRW", "MXN", "MYR", "NOK", "NZD", "PHP", "PLN", "SEK", "SGD", "THB", "TWD", "USD", "VND", "ZAR"] } }

# Cohort: a "region" derived from country. Lets you write one override that
# covers all SEPA countries instead of 27 individual country contexts.
region = { position = 1, type = "LOCAL_COHORT:country", schema = { type = "string", enum = ["europe", "north_america", "apac", "latam", "mea", "otherwise"], definitions = { europe = { in = [{ var = "country" }, ["AT", "BE", "CH", "CZ", "DE", "DK", "ES", "FI", "FR", "GB", "GR", "HU", "IE", "IT", "NL", "NO", "PL", "PT", "RO", "SE", "SK"]] }, north_america = { in = [{ var = "country" }, ["US", "CA", "MX"]] }, apac = { in = [{ var = "country" }, ["AU", "CN", "HK", "ID", "IN", "JP", "KR", "MY", "NZ", "PH", "SG", "TH", "TW", "VN"]] }, latam = { in = [{ var = "country" }, ["BR"]] }, mea = { in = [{ var = "country" }, ["ZA"]] } } } }

#-------------------------------------------------------------------------------
# Overrides
#-------------------------------------------------------------------------------

# --- [connectors] base_url section -------------------------------------------
# Original (one line per connector):
#   adyen.base_url = "https://checkout-test.adyen.com/"
#   stripe.base_url = "https://api.stripe.com/"
#   ...

[[overrides]]
_context_ = { connector = "adyen" }
base_url = "https://checkout-test.adyen.com/"

[[overrides]]
_context_ = { connector = "stripe" }
base_url = "https://api.stripe.com/"

[[overrides]]
_context_ = { connector = "checkout" }
base_url = "https://api.sandbox.checkout.com/"

[[overrides]]
_context_ = { connector = "paypal" }
base_url = "https://www.sandbox.paypal.com/"

[[overrides]]
_context_ = { connector = "cybersource" }
base_url = "https://apitest.cybersource.com/"

