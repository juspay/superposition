# --- [mandates] and [zero_mandates] via payment_type --------------------------
# Source had two sections:
#   [mandates.supported_payment_methods]      card.credit.connector_list = "..."
#   [zero_mandates.supported_payment_methods] card.credit.connector_list = "..."
# Modelled here with payment_type dimension. Two "denial floor" overrides
# disable everything for payment_type = mandate / zero_dollar_mandate; per-
# (connector, payment_method) overrides re-enable just the supported pairs.
# payment_type is at the highest position (7), so the floor (weight 128) beats
# any broader connector+pm "enabled" rule (weight 40), and the specific re-
# enables (weight 128+40 = 168) beat the floor.

# Denial floors.
[[overrides]]
_context_ = { payment_type = "mandate" }
enabled = false

[[overrides]]
_context_ = { payment_type = "zero_dollar_mandate" }
enabled = false

# Mandates: card.credit / card.debit connector_list = "...stripe,adyen,cybersource..."
[[overrides]]
_context_ = { connector = "stripe", payment_method = "credit", payment_type = "mandate" }
enabled = true

[[overrides]]
_context_ = { connector = "stripe", payment_method = "debit", payment_type = "mandate" }
enabled = true

[[overrides]]
_context_ = { connector = "adyen", payment_method = "credit", payment_type = "mandate" }
enabled = true

[[overrides]]
_context_ = { connector = "adyen", payment_method = "debit", payment_type = "mandate" }
enabled = true

[[overrides]]
_context_ = { connector = "cybersource", payment_method = "credit", payment_type = "mandate" }
enabled = true

# Zero-dollar mandates: only adyen on cards in source.
[[overrides]]
_context_ = { connector = "adyen", payment_method = "credit", payment_type = "zero_dollar_mandate" }
enabled = true

[[overrides]]
_context_ = { connector = "adyen", payment_method = "debit", payment_type = "zero_dollar_mandate" }
enabled = true

# bank_debit.ach: gocardless supports both mandate and zero-dollar.
[[overrides]]
_context_ = { connector = "gocardless", payment_method = "ach", payment_type = "mandate" }
enabled = true

[[overrides]]
_context_ = { connector = "gocardless", payment_method = "ach", payment_type = "zero_dollar_mandate" }
enabled = true

[[overrides]]
_context_ = { connector = "gocardless", payment_method = "sepa", payment_type = "mandate" }
enabled = true

[[overrides]]
_context_ = { connector = "gocardless", payment_method = "sepa", payment_type = "zero_dollar_mandate" }
enabled = true

# --- [installments] + [installment_config] ------------------------------------
# installments.supported_payment_methods: card.credit = "adyen"
